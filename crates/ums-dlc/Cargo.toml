[package]
name = "ums-dlc"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "The UMS <-> game DLC bridge contract checker."

[dependencies]
serde_json.workspace = true
clap.workspace = true
# The verb registry and the closed vocabularies, generated from
# config/verbs.ncl. Sharing them is the point: the validator and the engine
# cannot disagree about what a valid edit is.
ums-ai-edit = { path = "../ums-ai-edit" }
ums-profile-sdk = { path = "../ums-profile-sdk" }

[[bin]]
name = "ums-dlc"
path = "src/main.rs"
