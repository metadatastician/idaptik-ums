# SPDX-License-Identifier: MPL-2.0
name: Idris2 ABI CI
on:
  push:
    branches: [main, master]
    paths:
      - 'abi/**'
      - 'idaptik-ums.ipkg'
      - '.github/workflows/idris-ci.yml'
  pull_request:
    paths:
      - 'abi/**'
      - 'idaptik-ums.ipkg'
      - '.github/workflows/idris-ci.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/stefan-hoeck/idris2-pack@sha256:f0758996a931fb35d9ecb1de273c4d59dabe2a09b433afc7e357f65a08b7e1ff
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Typecheck ABI package
        run: idris2 --typecheck idaptik-ums.ipkg
