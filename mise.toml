#
# Toolchain pins for idaptik-ums, managed by mise (https://mise.jdx.dev).
#
# Written fresh for the canonical repo. The lineage repo's mise.toml was NOT
# copied: it contains an unresolved git merge conflict and a pile of "latest"
# pins that were never intended to ship.
#
#   $ mise trust      # REQUIRED FIRST — see below
#   $ mise install    # install everything pinned here
#   $ just test-ffi   # 24 Zig integration tests, no other toolchain required
#
# `mise trust` is not optional politeness. An untrusted config is silently
# IGNORED for PATH resolution and mise falls back to the global toolchain —
# no warning, no error. `just build` / `just test-ffi` assert the zig version
# up front (see _zig-guard in the Justfile) so a bypassed pin fails loudly.

[tools]
# C ABI for the FFI surface; matches the game (IDApTIK ADR-0001).
# The FFI does NOT compile under zig 0.16 — its explicit-Io rework removed
# std.fs.openFileAbsolute / makeDirAbsolute and std.io.fixedBufferStream.
# The 0.16 migration is a separate, deliberate slice; do not bump this pin
# as a side effect of anything else.
zig = "0.14.0"

# Task runner for this repo's Justfile.
just = "1.46.0"
