#
# Rust is managed by rustup (not mise), matching the sibling IDApTIK repo, so
# cargo subcommands and the rust-analyzer/clippy components resolve the same
# way in editors, CI and Claude Code sessions.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy", "rust-src", "rust-analyzer"]
