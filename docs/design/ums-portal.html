<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Universal Modding Studio — Interface Mock-up</title>
  <style>
    :root {
      --bg: #0b0f14;
      --bg-elev: #111722;
      --bg-soft: #151d2a;
      --bg-soft-2: #1b2636;
      --panel: rgba(17, 23, 34, 0.96);
      --panel-2: rgba(22, 31, 45, 0.98);
      --line: #29364a;
      --line-soft: #1f2a3a;
      --text: #eef4fb;
      --text-dim: #97a8bc;
      --text-faint: #65758a;
      --accent: #69d3ff;
      --accent-2: #a78bfa;
      --good: #67e8a5;
      --warn: #f8c75c;
      --bad: #ff7b8b;
      --idaptik: #59d0f5;
      --slavia: #c9a7ff;
      --shadow: 0 18px 50px rgba(0,0,0,.34);
      --radius: 12px;
      --mono: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -10%, rgba(70, 130, 180, .12), transparent 30%),
        radial-gradient(circle at 92% 0%, rgba(130, 90, 220, .10), transparent 27%),
        var(--bg);
      font-family: var(--sans);
      font-size: 13px;
    }

    button, input, select, textarea { font: inherit; }
    button { color: inherit; }

    .app {
      display: grid;
      grid-template-rows: 48px 40px minmax(0,1fr) 226px;
      height: 100vh;
      min-width: 1120px;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: rgba(9, 13, 19, .92);
      border-bottom: 1px solid var(--line-soft);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 760;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 27px;
      height: 27px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(105,211,255,.28), rgba(167,139,250,.30));
      border: 1px solid rgba(105,211,255,.38);
      box-shadow: inset 0 0 18px rgba(105,211,255,.08);
      font-size: 11px;
      font-family: var(--mono);
    }

    .project-chip, .branch-chip, .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg-elev);
      color: var(--text-dim);
      white-space: nowrap;
    }

    .project-chip strong { color: var(--text); font-weight: 650; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); box-shadow: 0 0 9px rgba(103,232,165,.65); }

    .top-actions { display: flex; gap: 7px; align-items: center; }
    .btn {
      height: 30px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--bg-elev);
      cursor: pointer;
      color: var(--text-dim);
      transition: .16s ease;
    }
    .btn:hover { border-color: #3b4e68; color: var(--text); transform: translateY(-1px); }
    .btn.primary { background: linear-gradient(180deg, #1c5570, #153d52); border-color: #34799b; color: #f6fcff; }
    .btn.good { background: linear-gradient(180deg, #1d5b46, #154132); border-color: #2d8b69; color: #eefff7; }
    .btn.icon { width: 31px; padding: 0; display: grid; place-items: center; }
    .btn.active { border-color: var(--accent); color: var(--accent); box-shadow: inset 0 0 18px rgba(105,211,255,.08); }

    .lensbar {
      display: grid;
      grid-template-columns: 240px minmax(0,1fr) 310px;
      align-items: stretch;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(14, 20, 29, .94);
      z-index: 15;
    }

    .profile-switch {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 10px;
      border-right: 1px solid var(--line-soft);
    }

    .profile-select {
      width: 100%;
      height: 30px;
      color: var(--text);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 9px;
      outline: none;
    }

    .lenses {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px 8px;
      overflow: hidden;
    }

    .lens {
      height: 31px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      white-space: nowrap;
    }
    .lens:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .lens.active { background: var(--bg-soft-2); border-color: var(--line); color: var(--accent); }

    .view-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      padding: 4px 10px;
      border-left: 1px solid var(--line-soft);
    }

    .workspace {
      display: grid;
      grid-template-columns: 240px minmax(0,1fr) 310px;
      min-height: 0;
    }

    .sidebar, .inspector {
      background: var(--panel);
      min-height: 0;
      overflow: hidden;
    }
    .sidebar { border-right: 1px solid var(--line-soft); }
    .inspector { border-left: 1px solid var(--line-soft); }

    .panel-head {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 11px;
      border-bottom: 1px solid var(--line-soft);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .09em;
      font-weight: 750;
    }

    .search-box { padding: 9px 10px 7px; }
    .search-box input {
      width: 100%; height: 30px;
      background: #0e141d;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      padding: 0 10px;
      outline: none;
    }
    .search-box input:focus { border-color: #3b718a; }

    .tree {
      height: calc(100% - 84px);
      overflow: auto;
      padding: 4px 8px 20px;
    }
    .tree::-webkit-scrollbar, .inspector-scroll::-webkit-scrollbar, .dock-content::-webkit-scrollbar { width: 9px; height: 9px; }
    .tree::-webkit-scrollbar-thumb, .inspector-scroll::-webkit-scrollbar-thumb, .dock-content::-webkit-scrollbar-thumb { background: #263449; border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }

    .tree-section { margin: 6px 0 2px; }
    .tree-title {
      display: flex; align-items: center; gap: 7px;
      height: 26px; padding: 0 7px;
      color: #c2cede; font-weight: 650; cursor: default;
    }
    .caret { color: var(--text-faint); font-size: 10px; }
    .tree-item {
      display: flex; align-items: center; gap: 8px;
      height: 27px; padding: 0 7px 0 24px;
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
    }
    .tree-item:hover { background: rgba(255,255,255,.035); color: var(--text); }
    .tree-item.selected { background: rgba(105,211,255,.10); color: var(--accent); box-shadow: inset 2px 0 0 var(--accent); }
    .tree-item .mini { margin-left: auto; color: var(--text-faint); font-size: 10px; }
    .type-dot { width: 7px; height: 7px; border-radius: 2px; background: #65819f; }
    .type-dot.actor { border-radius: 50%; background: #d4a8ff; }
    .type-dot.system { background: #65d3a3; }
    .type-dot.mission { background: #ffc76c; }
    .type-dot.info { transform: rotate(45deg); background: #79b7ff; }

    .canvas {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px),
        radial-gradient(circle at 52% 40%, rgba(35, 74, 98, .22), transparent 40%),
        #0c121a;
      background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%;
    }

    .canvas-head {
      position: absolute;
      left: 12px; right: 12px; top: 10px;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }
    .crumb {
      display: inline-flex; align-items: center; gap: 8px;
      min-height: 31px; padding: 0 10px;
      background: rgba(11,16,23,.86);
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--text-dim);
      box-shadow: var(--shadow);
      pointer-events: auto;
    }
    .crumb strong { color: var(--text); }
    .canvas-actions { display: flex; gap: 6px; pointer-events: auto; }

    .stage {
      position: absolute;
      inset: 0;
      padding: 58px 26px 24px;
    }

    .building {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      filter: drop-shadow(0 18px 34px rgba(0,0,0,.28));
    }

    .floor {
      display: grid;
      grid-template-columns: 1.1fr 1.35fr .9fr 1.25fr;
      gap: 7px;
      min-height: 0;
    }

    .room {
      position: relative;
      overflow: hidden;
      border: 1px solid #35506a;
      background: linear-gradient(180deg, rgba(35,49,65,.88), rgba(22,31,43,.94));
      border-radius: 8px;
      cursor: pointer;
      transition: .16s ease;
      min-width: 0;
    }
    .room:hover { border-color: #5682a7; transform: translateY(-1px); }
    .room.selected { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(105,211,255,.24), inset 0 0 28px rgba(105,211,255,.08); }
    .room.danger { border-color: #84505a; background: linear-gradient(180deg, rgba(69,39,47,.88), rgba(31,24,31,.95)); }
    .room.rift { border-color: #745cb5; background: linear-gradient(180deg, rgba(59,43,88,.88), rgba(27,23,43,.95)); }

    .room-label {
      position: absolute;
      left: 9px; top: 7px;
      color: #c8d5e4;
      font-size: 11px;
      font-weight: 720;
      letter-spacing: .02em;
    }
    .room-meta {
      position: absolute;
      right: 8px; top: 7px;
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 9px;
    }
    .room-floor-line {
      position: absolute; left: 0; right: 0; bottom: 14px; height: 1px; background: #49647e;
    }

    .device, .actor-node, .prop-node {
      position: absolute;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: .14s ease;
      user-select: none;
    }
    .device {
      width: 28px; height: 20px;
      background: #1b2e3f;
      border: 1px solid #5080a5;
      border-radius: 4px;
      color: #8edcff;
      font-size: 10px;
      font-family: var(--mono);
    }
    .actor-node {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #302742;
      border: 1px solid #a887d7;
      color: #e2cbff;
      font-size: 11px;
    }
    .actor-node.guard { background: #3b2830; border-color: #d4788b; color: #ffd6dd; }
    .actor-node.hacker { background: #183442; border-color: #58c7ef; color: #c7f1ff; }
    .actor-node.heroine { background: #3d294d; border-color: #bd8af1; color: #f2dcff; }
    .prop-node {
      width: 20px; height: 20px;
      transform: rotate(45deg);
      background: #3d3420;
      border: 1px solid #d2ad55;
      border-radius: 3px;
      color: #ffe2a1;
      font-size: 9px;
    }
    .prop-node > span { transform: rotate(-45deg); }
    .device:hover, .actor-node:hover, .prop-node:hover { transform: scale(1.12); z-index: 3; }
    .prop-node:hover { transform: rotate(45deg) scale(1.12); }
    .device.selected, .actor-node.selected, .prop-node.selected { box-shadow: 0 0 0 2px var(--accent), 0 0 18px rgba(105,211,255,.32); }

    .wire {
      position: absolute;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(105,211,255,.15), rgba(105,211,255,.85));
      opacity: .7;
      pointer-events: none;
    }
    .wire.power { background: linear-gradient(90deg, rgba(248,199,92,.15), rgba(248,199,92,.9)); }
    .wire.affect { background: linear-gradient(90deg, rgba(201,167,255,.12), rgba(201,167,255,.85)); height: 3px; filter: blur(.2px); }

    .legend {
      position: absolute;
      left: 18px; bottom: 14px;
      display: flex; gap: 12px;
      padding: 7px 10px;
      background: rgba(11,16,23,.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text-faint);
      font-size: 10px;
      z-index: 5;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .legend i { width: 16px; height: 2px; background: var(--accent); display: inline-block; }

    .inspector-tabs {
      display: flex;
      border-bottom: 1px solid var(--line-soft);
      padding: 0 6px;
      height: 37px;
    }
    .inspector-tab {
      padding: 0 9px;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 11px;
    }
    .inspector-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .inspector-scroll { height: calc(100% - 75px); overflow: auto; padding: 10px 11px 30px; }

    .entity-summary {
      display: flex; align-items: center; gap: 10px;
      padding: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 9px;
      margin-bottom: 10px;
    }
    .entity-icon {
      width: 38px; height: 38px;
      display: grid; place-items: center;
      background: #132431;
      border: 1px solid #38617b;
      border-radius: 9px;
      color: var(--accent);
      font-family: var(--mono);
      font-weight: 800;
    }
    .entity-summary h3 { margin: 0 0 3px; font-size: 14px; }
    .entity-summary p { margin: 0; color: var(--text-faint); font-size: 11px; }

    .badges { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .badge { padding: 3px 6px; border: 1px solid var(--line); border-radius: 6px; background: #111a25; color: var(--text-faint); font-size: 9px; font-family: var(--mono); }
    .badge.bound { color: #c7b4ff; border-color: #4f416c; }
    .badge.generated { color: #8ddfb9; border-color: #315b49; }

    .section-card {
      margin: 8px 0;
      border: 1px solid var(--line-soft);
      border-radius: 9px;
      overflow: hidden;
      background: rgba(10,15,22,.46);
    }
    .section-card h4 {
      margin: 0;
      padding: 8px 9px;
      color: #c5d0dd;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255,255,255,.018);
    }
    .fields { padding: 8px 9px; display: grid; gap: 7px; }
    .field { display: grid; grid-template-columns: 96px minmax(0,1fr); gap: 8px; align-items: center; }
    .field label { color: var(--text-faint); font-size: 10px; }
    .field input, .field select {
      width: 100%; min-width: 0; height: 27px;
      color: var(--text);
      background: #0f151e;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 7px;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: #467993; }

    .meter-row { display: grid; grid-template-columns: 82px minmax(0,1fr) 34px; gap: 7px; align-items: center; margin: 7px 0; }
    .meter-row span { color: var(--text-faint); font-size: 10px; }
    .meter { height: 7px; background: #0c1118; border: 1px solid #233044; border-radius: 6px; overflow: hidden; }
    .meter > i { display: block; height: 100%; background: linear-gradient(90deg, #4cb1da, #7f8cff); }
    .meter-row b { color: #cdd8e7; font-size: 9px; font-family: var(--mono); text-align: right; }

    .dock {
      display: grid;
      grid-template-rows: 36px minmax(0,1fr);
      background: rgba(11,16,23,.98);
      border-top: 1px solid var(--line);
      min-height: 0;
    }
    .dock-tabs { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line-soft); }
    .dock-tabs-left { display: flex; height: 100%; }
    .dock-tab {
      height: 100%; padding: 0 13px;
      border: 0; border-right: 1px solid var(--line-soft); border-bottom: 2px solid transparent;
      background: transparent; color: var(--text-faint); cursor: pointer;
    }
    .dock-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(255,255,255,.018); }
    .dock-summary { display: flex; align-items: center; gap: 10px; padding-right: 12px; color: var(--text-faint); font-size: 10px; }
    .count { display: inline-flex; align-items: center; gap: 5px; }
    .count i { width: 7px; height: 7px; border-radius: 50%; background: var(--good); }
    .count.warn i { background: var(--warn); }
    .count.bad i { background: var(--bad); }

    .dock-content { overflow: auto; min-height: 0; }
    .dock-pane { display: none; height: 100%; }
    .dock-pane.active { display: block; }

    .problems-table, .trace-table, .history-table {
      width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 11px;
    }
    .problems-table th, .trace-table th, .history-table th {
      position: sticky; top: 0; z-index: 1;
      text-align: left; color: var(--text-faint); font-weight: 650;
      background: #0f151f; border-bottom: 1px solid var(--line-soft);
      padding: 7px 10px;
    }
    .problems-table td, .trace-table td, .history-table td { padding: 7px 10px; border-bottom: 1px solid #182230; color: #aebccd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sev { font-family: var(--mono); font-size: 9px; }
    .sev.good { color: var(--good); }
    .sev.warn { color: var(--warn); }
    .sev.bad { color: var(--bad); }
    .row-link { color: var(--accent); cursor: pointer; }

    .constraint-layout { display: grid; grid-template-columns: 340px minmax(0,1fr); height: 100%; }
    .constraint-editor { border-right: 1px solid var(--line-soft); padding: 10px; overflow: auto; }
    .constraint-editor textarea {
      width: 100%; height: 82px; resize: none;
      background: #0e141d; border: 1px solid var(--line); border-radius: 8px;
      color: var(--text); padding: 8px; outline: none;
    }
    .constraint-options { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 8px 0; }
    .mini-select { height: 28px; background: #0e141d; color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 0 7px; }
    .proposal-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 9px; padding: 10px; }
    .proposal { border: 1px solid var(--line); border-radius: 9px; background: var(--bg-soft); padding: 10px; cursor: pointer; }
    .proposal:hover { border-color: #46647e; }
    .proposal.selected { border-color: var(--accent); box-shadow: inset 0 0 18px rgba(105,211,255,.06); }
    .proposal h4 { margin: 0 0 5px; font-size: 12px; }
    .proposal p { margin: 0 0 8px; color: var(--text-faint); line-height: 1.4; }
    .proposal code { color: #b9c9dc; font-family: var(--mono); font-size: 9px; }

    .sim-controls { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border-bottom: 1px solid var(--line-soft); background: #0f151e; }
    .sim-time { color: var(--text-faint); font-family: var(--mono); margin-left: 4px; }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 238px;
      padding: 10px 12px;
      background: #12202b;
      border: 1px solid #2f617c;
      border-radius: 9px;
      box-shadow: var(--shadow);
      color: #dff6ff;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: .2s ease;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    .profile-accent-idaptik { --accent: var(--idaptik); }
    .profile-accent-slavia { --accent: var(--slavia); }

    @media (max-width: 1280px) {
      .app { grid-template-rows: 48px 40px minmax(0,1fr) 210px; }
      .workspace, .lensbar { grid-template-columns: 210px minmax(0,1fr) 285px; }
      .profile-switch { padding-left: 8px; padding-right: 8px; }
      .lens { padding: 0 7px; font-size: 11px; }
    }
  </style>
</head>
<body class="profile-accent-idaptik">
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="brand-mark">UMS</div><span>Universal Modding Studio</span></div>
      <div class="project-chip"><span class="dot"></span><strong id="projectName">Ghost Lobby</strong><span id="profileVersion">idaptik/0.1</span></div>
      <div class="branch-chip">⌘ <span>scenario/ghost-lobby</span></div>
      <div class="top-actions">
        <button class="btn icon" title="Undo">↶</button>
        <button class="btn icon" title="Redo">↷</button>
        <button class="btn" id="validateBtn">Validate</button>
        <button class="btn" id="generateBtn">Generate</button>
        <button class="btn good" id="simulateBtn">▶ Simulate</button>
        <button class="btn primary" id="buildBtn">Build Package</button>
      </div>
    </header>

    <nav class="lensbar">
      <div class="profile-switch">
        <select id="profileSelect" class="profile-select" aria-label="Game profile">
          <option value="idaptik">IDApTIK Profile</option>
          <option value="slavia">Chronicles of Slavia Profile</option>
        </select>
      </div>
      <div class="lenses" id="lensBar"></div>
      <div class="view-tools">
        <button class="btn icon active" data-view="cutaway" title="Cutaway">▤</button>
        <button class="btn icon" data-view="graph" title="Graph">⌘</button>
        <button class="btn icon" data-view="table" title="Table">▦</button>
        <button class="btn icon" id="fitBtn" title="Fit view">⛶</button>
      </div>
    </nav>

    <main class="workspace">
      <aside class="sidebar">
        <div class="panel-head"><span>Project Navigator</span><span>＋</span></div>
        <div class="search-box"><input id="treeSearch" type="search" placeholder="Filter project…" /></div>
        <div class="tree" id="tree"></div>
      </aside>

      <section class="canvas">
        <div class="canvas-head">
          <div class="crumb"><span id="crumbProfile">IDApTIK</span><span>›</span><strong id="crumbLens">World</strong><span>›</span><span id="crumbObject">Facility</span></div>
          <div class="canvas-actions">
            <button class="btn" id="overlayBtn">Overlays: 3</button>
            <button class="btn" id="lockBtn">Lock geometry</button>
          </div>
        </div>
        <div class="stage" id="stage"></div>
        <div class="legend" id="legend"></div>
      </section>

      <aside class="inspector">
        <div class="panel-head"><span>Universal Inspector</span><span id="selectionKind">Room</span></div>
        <div class="inspector-tabs" id="inspectorTabs"></div>
        <div class="inspector-scroll" id="inspectorContent"></div>
      </aside>
    </main>

    <section class="dock">
      <div class="dock-tabs">
        <div class="dock-tabs-left" id="dockTabs"></div>
        <div class="dock-summary">
          <span class="count"><i></i><span id="okCount">18 passed</span></span>
          <span class="count warn"><i></i><span id="warnCount">2 warnings</span></span>
          <span class="count bad"><i></i><span id="badCount">0 errors</span></span>
        </div>
      </div>
      <div class="dock-content" id="dockContent"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const lensNames = ["World", "Systems", "Actors", "Cognition", "Affect", "Conation", "Behaviour", "Narrative", "Mission", "Test"];
    const inspectorTabNames = ["Definition", "Components", "Relations", "Events", "Validation"];
    const dockTabNames = ["Problems", "Constraints", "Solver Proposals", "Edit History", "Simulation Trace", "Guarantees"];

    const profiles = {
      idaptik: {
        label: "IDApTIK",
        project: "Ghost Lobby",
        version: "idaptik/0.1",
        rootLabel: "Facility",
        accentClass: "profile-accent-idaptik",
        legend: [
          ["Data/network", "#69d3ff"], ["Power", "#f8c75c"], ["Security risk", "#ff7b8b"]
        ],
        tree: [
          { title: "Package", items: [["Manifest", "info"], ["Capabilities", "info"], ["Dependencies", "info"]] },
          { title: "World", items: [["Ghost Lobby", "mission", "selected"], ["Ground Floor", ""], ["Operations Floor", ""], ["Roof Access", ""]] },
          { title: "Systems", items: [["Grounded Network", "system"], ["Power Grid", "system"], ["Camera Loop", "system"], ["PBX / Comms", "system"], ["Alert Doctrine", "system"]] },
          { title: "Actors", items: [["Infiltrator", "actor"], ["Hacker", "actor"], ["Billy", "actor"], ["Security Operator", "actor"], ["Civilian Staff", "actor"]] },
          { title: "Knowledge", items: [["Known Credentials", "info"], ["Camera Beliefs", "info"], ["Guard Suspicion", "info"]] },
          { title: "Mission", items: [["Primary Route", "mission"], ["Laundry Chute Exit", "mission"], ["USB Decoy", "mission"]] }
        ],
        defaultSelection: {
          id: "ops-room", kind: "Room", icon: "R", name: "Operations Room", subtitle: "world.room · floor 2 · tier 3",
          badges: ["UMS-owned", "ABI-bound", "Generated"],
          fields: { ID: "ops-room", Name: "Operations Room", Floor: "2", Zone: "Internal", Support: "0.74", Lit: "true" },
          affect: { Composure: 72, Anxiety: 18, Confidence: 64, Tension: 31 }
        }
      },
      slavia: {
        label: "Chronicles of Slavia",
        project: "The First Tear — Zone A",
        version: "chronicles-of-slavia/0.1",
        rootLabel: "Border Path",
        accentClass: "profile-accent-slavia",
        legend: [
          ["Quickening", "#f4c86b"], ["Settling", "#85d7bd"], ["Rift influence", "#c9a7ff"]
        ],
        tree: [
          { title: "Package", items: [["Manifest", "info"], ["Capabilities", "info"], ["Dependencies", "info"]] },
          { title: "World", items: [["Border Path", "mission", "selected"], ["Bird Clearing", ""], ["Unstable Bridge", ""], ["Wayside Shrine", ""], ["Rift Verge", ""]] },
          { title: "Living World", items: [["Bird Flock", "actor"], ["Bridge Memory", "info"], ["Place Receptivity", "system"], ["Natural Responses", "system"]] },
          { title: "Characters", items: [["Anya", "actor"], ["Donna", "actor"]] },
          { title: "Influences", items: [["Quickening", "system"], ["Settling", "system"], ["Rift Corruption", "system"]] },
          { title: "Story", items: [["First Crossing", "mission"], ["Shrine Recognition", "mission"], ["Rift Interruption", "mission"]] }
        ],
        defaultSelection: {
          id: "bridge", kind: "World Object", icon: "B", name: "Unstable Bridge", subtitle: "world.structure · Zone A · receptive",
          badges: ["Profile-owned", "Enaction-ready", "Generated"],
          fields: { ID: "bridge", Name: "Unstable Bridge", Zone: "Border Path", Stability: "0.34", Memory: "care:0.20", Corrupted: "false" },
          affect: { Quickening: 28, Settling: 61, Receptivity: 84, Corruption: 12 }
        }
      }
    };

    const state = {
      profile: "idaptik",
      lens: "World",
      inspectorTab: "Definition",
      dockTab: "Problems",
      selected: null,
      simRunning: false,
      simTick: 0,
      trace: [],
      filteredTree: ""
    };

    const el = id => document.getElementById(id);

    function showToast(message) {
      const toast = el("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function renderLenses() {
      el("lensBar").innerHTML = lensNames.map(name => `<button class="lens ${state.lens === name ? "active" : ""}" data-lens="${name}">${name}</button>`).join("");
      document.querySelectorAll(".lens").forEach(btn => btn.addEventListener("click", () => {
        state.lens = btn.dataset.lens;
        el("crumbLens").textContent = state.lens;
        renderLenses();
        renderStage();
        renderInspector();
      }));
    }

    function renderTree() {
      const profile = profiles[state.profile];
      const q = state.filteredTree.trim().toLowerCase();
      el("tree").innerHTML = profile.tree.map(section => {
        const items = section.items.filter(item => !q || item[0].toLowerCase().includes(q) || section.title.toLowerCase().includes(q));
        if (!items.length) return "";
        return `<div class="tree-section"><div class="tree-title"><span class="caret">▼</span>${section.title}</div>${items.map(([name,type,selected]) => `<div class="tree-item ${selected && !q ? "selected" : ""}" data-tree-name="${name}"><span class="type-dot ${type || ""}"></span><span>${name}</span><span class="mini">${type || "item"}</span></div>`).join("")}</div>`;
      }).join("");
      document.querySelectorAll(".tree-item").forEach(item => item.addEventListener("click", () => {
        document.querySelectorAll(".tree-item").forEach(i => i.classList.remove("selected"));
        item.classList.add("selected");
        const name = item.dataset.treeName;
        state.selected = {...profiles[state.profile].defaultSelection, name, subtitle: `${state.lens.toLowerCase()}.selection · profile-owned`};
        el("crumbObject").textContent = name;
        renderInspector();
      }));
    }

    function roomHTML(room, content) {
      return `<div class="room ${room.className || ""} ${state.selected?.id === room.id ? "selected" : ""}" data-select-id="${room.id}" data-kind="Room" data-name="${room.name}">
        <span class="room-label">${room.name}</span><span class="room-meta">${room.meta || ""}</span><div class="room-floor-line"></div>${content || ""}</div>`;
    }

    function renderIdaptikWorld() {
      return `<div class="building">
        <div class="floor">
          ${roomHTML({id:"roof",name:"Snow Perimeter",meta:"EXT"}, `<div class="actor-node guard" style="left:18%;bottom:24px" data-select-id="guard-west" data-kind="Actor" data-name="West Guard">G</div><div class="device" style="right:10%;top:42%" data-select-id="floodlight" data-kind="Device" data-name="Floodlight">LUX</div>`)}
          ${roomHTML({id:"stair",name:"Secure Stairwell",meta:"T2"}, `<div class="device" style="left:45%;bottom:28px" data-select-id="laser-grid" data-kind="Device" data-name="Laser Grid">LAS</div>`)}
          ${roomHTML({id:"comms",name:"Comms Closet",meta:"T3"}, `<div class="device" style="left:24%;bottom:28px" data-select-id="pbx" data-kind="Device" data-name="PBX Node">PBX</div><div class="device" style="right:18%;bottom:28px" data-select-id="switch" data-kind="Device" data-name="Core Switch">SW</div><div class="wire" style="left:42%;bottom:38px;width:38%;transform:rotate(0deg)"></div>`)}
          ${roomHTML({id:"security-hub",name:"Security Hub",meta:"T4",className:"danger"}, `<div class="actor-node" style="left:18%;bottom:25px" data-select-id="operator" data-kind="Actor" data-name="Security Operator">O</div><div class="device" style="right:12%;bottom:28px" data-select-id="console" data-kind="Device" data-name="Surveillance Console">CRT</div>`)}
        </div>
        <div class="floor">
          ${roomHTML({id:"data-room",name:"Data Processing",meta:"T3"}, `<div class="device" style="left:18%;bottom:28px" data-select-id="server-a" data-kind="Device" data-name="Server A">SVR</div><div class="device" style="right:18%;bottom:28px" data-select-id="router-a" data-kind="Device" data-name="Router A">RTR</div><div class="wire" style="left:37%;bottom:38px;width:43%;transform:rotate(0deg)"></div>`)}
          ${roomHTML({id:"ops-room",name:"Operations Room",meta:"T3"}, `<div class="actor-node guard" style="left:46%;bottom:25px" data-select-id="billy" data-kind="Actor" data-name="Billy">B</div><div class="device" style="right:12%;bottom:28px" data-select-id="camera-02" data-kind="Device" data-name="Camera 02">CAM</div>`)}
          ${roomHTML({id:"archive",name:"Archive",meta:"T2"}, `<div class="prop-node" style="left:48%;bottom:28px" data-select-id="document" data-kind="Item" data-name="Target Document"><span>DOC</span></div>`)}
          ${roomHTML({id:"office",name:"Executive Office",meta:"T4",className:"danger"}, `<div class="actor-node guard" style="left:22%;bottom:25px" data-select-id="chief" data-kind="Actor" data-name="Security Chief">C</div><div class="prop-node" style="right:20%;bottom:28px" data-select-id="usb" data-kind="Item" data-name="USB Decoy"><span>USB</span></div>`)}
        </div>
        <div class="floor">
          ${roomHTML({id:"laundry",name:"Laundry",meta:"T1"}, `<div class="prop-node" style="left:25%;bottom:28px" data-select-id="vacuum" data-kind="Item" data-name="Vacuum"><span>VAC</span></div><div class="device" style="right:16%;bottom:28px" data-select-id="chute" data-kind="Device" data-name="Laundry Chute">CHT</div>`)}
          ${roomHTML({id:"lobby",name:"Main Lobby",meta:"T2"}, `<div class="actor-node hacker" style="left:18%;bottom:25px" data-select-id="infiltrator" data-kind="Actor" data-name="Infiltrator">I</div><div class="actor-node guard" style="right:18%;bottom:25px" data-select-id="guard-lobby" data-kind="Actor" data-name="Lobby Guard">G</div>`)}
          ${roomHTML({id:"kitchen",name:"Kitchen",meta:"T1"}, `<div class="prop-node" style="left:30%;bottom:28px" data-select-id="note" data-kind="Item" data-name="Sticky Note"><span>KEY</span></div>`)}
          ${roomHTML({id:"loading",name:"Loading Bay",meta:"EXT"}, `<div class="device" style="left:20%;bottom:28px" data-select-id="door-control" data-kind="Device" data-name="Door Controller">DOR</div><div class="actor-node guard" style="right:18%;bottom:25px" data-select-id="loading-guard" data-kind="Actor" data-name="Loading Guard">G</div>`)}
        </div>
      </div>`;
    }

    function renderSlaviaWorld() {
      return `<div class="building" style="grid-template-rows:1fr 1fr 1fr">
        <div class="floor" style="grid-template-columns:1.2fr 1fr 1.3fr 1fr">
          ${roomHTML({id:"high-path",name:"High Border Path",meta:"MEM:0.2"}, `<div class="actor-node heroine" style="left:18%;bottom:25px" data-select-id="anya" data-kind="Character" data-name="Anya">A</div><div class="wire affect" style="left:28%;bottom:37px;width:48%;transform:rotate(-4deg)"></div>`)}
          ${roomHTML({id:"bird-clearing",name:"Bird Clearing",meta:"REC:0.8"}, `<div class="actor-node" style="left:42%;bottom:25px" data-select-id="birds" data-kind="Living Entity" data-name="Bird Flock">⌁</div><div class="wire affect" style="left:18%;bottom:48px;width:64%;transform:rotate(0deg)"></div>`)}
          ${roomHTML({id:"shrine",name:"Wayside Shrine",meta:"MEM:0.6"}, `<div class="prop-node" style="left:46%;bottom:29px" data-select-id="shrine-object" data-kind="World Object" data-name="Wayside Shrine"><span>✦</span></div>`)}
          ${roomHTML({id:"rift-verge",name:"Rift Verge",meta:"COR:0.4",className:"rift"}, `<div class="device" style="left:44%;bottom:31px;border-color:#a685ef;color:#e5d7ff" data-select-id="rift" data-kind="World Phenomenon" data-name="Rift Tear">RFT</div>`)}
        </div>
        <div class="floor" style="grid-template-columns:1fr 1.4fr 1.4fr 1fr">
          ${roomHTML({id:"lower-path",name:"Lower Path",meta:"REC:0.4"}, `<div class="actor-node heroine" style="left:24%;bottom:25px" data-select-id="donna" data-kind="Character" data-name="Donna">D</div><div class="wire affect" style="left:34%;bottom:37px;width:52%;transform:rotate(5deg);background:linear-gradient(90deg,rgba(133,215,189,.15),rgba(133,215,189,.9))"></div>`)}
          ${roomHTML({id:"bridge",name:"Unstable Bridge",meta:"STAB:0.34"}, `<div class="prop-node" style="left:46%;bottom:28px;background:#2e302b;border-color:#8fd0bd" data-select-id="bridge" data-kind="World Object" data-name="Unstable Bridge"><span>BRG</span></div>`)}
          ${roomHTML({id:"ravine",name:"Ravine",meta:"DEPTH"}, `<div class="wire affect" style="left:14%;bottom:44px;width:72%;transform:rotate(0deg);background:linear-gradient(90deg,rgba(201,167,255,.12),rgba(201,167,255,.8))"></div>`)}
          ${roomHTML({id:"far-bank",name:"Far Bank",meta:"GOAL"}, `<div class="prop-node" style="left:48%;bottom:28px" data-select-id="marker" data-kind="Objective" data-name="Overlook Marker"><span>◎</span></div>`)}
        </div>
        <div class="floor" style="grid-template-columns:1.2fr 1fr 1fr 1.2fr">
          ${roomHTML({id:"roots",name:"Root Hollow",meta:"MEM:0.7"}, `<div class="actor-node" style="left:48%;bottom:25px" data-select-id="small-animal" data-kind="Living Entity" data-name="Small Animal">◇</div>`)}
          ${roomHTML({id:"medicine",name:"Herb Verge",meta:"MED"}, `<div class="prop-node" style="left:42%;bottom:28px" data-select-id="herb" data-kind="Medicine" data-name="Mountain Herb"><span>HER</span></div>`)}
          ${roomHTML({id:"memory",name:"Remembering Stone",meta:"MEM:0.9"}, `<div class="prop-node" style="left:46%;bottom:28px;background:#2b2a3d;border-color:#9f8bd4" data-select-id="stone" data-kind="World Object" data-name="Remembering Stone"><span>MEM</span></div>`)}
          ${roomHTML({id:"absence",name:"Absence Field",meta:"PARKED",className:"rift"}, `<div class="device" style="left:42%;bottom:31px;border-color:#8f79c7;color:#d9ccff" data-select-id="absence-field" data-kind="World Rule" data-name="Absence Modulation">ABS</div>`)}
        </div>
      </div>`;
    }

    function renderGraphLens() {
      const nodes = state.profile === "idaptik"
        ? ["Van Vantage", "Lobby LAN", "Security VLAN", "PBX", "Camera 02", "Door Controller", "Substation"]
        : ["Anya", "Donna", "Bird Flock", "Bridge", "Shrine", "Rift Tear", "Border Path"];
      const accent = getComputedStyle(document.body).getPropertyValue("--accent");
      return `<svg viewBox="0 0 1000 520" width="100%" height="100%" aria-label="Graph view">
        <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        ${nodes.map((n,i)=>{
          const x = 120 + (i%4)*240 + (i>3?70:0), y = 135 + Math.floor(i/4)*230;
          if(i===0) return "";
          const px = 120 + ((i-1)%4)*240 + ((i-1)>3?70:0), py = 135 + Math.floor((i-1)/4)*230;
          return `<line x1="${px}" y1="${py}" x2="${x}" y2="${y}" stroke="${accent}" stroke-opacity=".45" stroke-width="2"/>`;
        }).join("")}
        ${nodes.map((n,i)=>{
          const x = 120 + (i%4)*240 + (i>3?70:0), y = 135 + Math.floor(i/4)*230;
          return `<g class="svg-node" data-graph-name="${n}" style="cursor:pointer"><circle cx="${x}" cy="${y}" r="42" fill="#152130" stroke="${accent}" stroke-width="2" filter="url(#glow)"/><text x="${x}" y="${y+4}" text-anchor="middle" fill="#e9f3fb" font-size="12" font-family="Inter, sans-serif">${n}</text></g>`;
        }).join("")}
      </svg>`;
    }

    function renderTableLens() {
      const rows = state.profile === "idaptik"
        ? [["ops-room","Room","Internal","valid"],["camera-02","Device","Security VLAN","valid"],["billy","Actor","Enforcer","warning"],["usb","Item","Contraband","valid"],["exit-chute","Objective","Alternative","valid"]]
        : [["bridge","World Object","Receptive","valid"],["birds","Living Entity","Natural response","valid"],["anya","Character","Quickening","valid"],["donna","Character","Settling","valid"],["rift","Phenomenon","Corruptive","warning"]];
      return `<div style="height:100%;padding:64px 28px 20px;overflow:auto"><table class="problems-table" style="background:#0f151e;border:1px solid var(--line);border-radius:10px;overflow:hidden"><thead><tr><th>ID</th><th>Kind</th><th>Profile classification</th><th>Status</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="row-link" data-table-name="${r[0]}">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="sev ${r[3]==='valid'?'good':'warn'}">${r[3].toUpperCase()}</td></tr>`).join("")}</tbody></table></div>`;
    }

    function renderStage() {
      const view = document.querySelector(".view-tools .active")?.dataset.view || "cutaway";
      const stage = el("stage");
      if (view === "graph" || ["Systems","Cognition","Affect","Conation","Behaviour","Narrative","Mission"].includes(state.lens)) {
        stage.innerHTML = renderGraphLens();
      } else if (view === "table" || state.lens === "Test") {
        stage.innerHTML = renderTableLens();
      } else {
        stage.innerHTML = state.profile === "idaptik" ? renderIdaptikWorld() : renderSlaviaWorld();
      }
      bindStageSelections();
      renderLegend();
    }

    function bindStageSelections() {
      document.querySelectorAll("[data-select-id]").forEach(node => node.addEventListener("click", ev => {
        ev.stopPropagation();
        document.querySelectorAll(".room,.device,.actor-node,.prop-node").forEach(n => n.classList.remove("selected"));
        node.classList.add("selected");
        const base = profiles[state.profile].defaultSelection;
        state.selected = {
          ...base,
          id: node.dataset.selectId,
          kind: node.dataset.kind,
          icon: (node.dataset.kind || "X").slice(0,1).toUpperCase(),
          name: node.dataset.name,
          subtitle: `${state.lens.toLowerCase()}.${(node.dataset.kind || "entity").toLowerCase().replaceAll(" ","-")} · profile-owned`,
          fields: {...base.fields, ID: node.dataset.selectId, Name: node.dataset.name}
        };
        el("crumbObject").textContent = node.dataset.name;
        renderInspector();
      }));
      document.querySelectorAll(".svg-node").forEach(node => node.addEventListener("click", () => {
        const name = node.dataset.graphName;
        const base = profiles[state.profile].defaultSelection;
        state.selected = {...base, name, id:name.toLowerCase().replaceAll(" ","-"), kind:"Graph Entity", icon:"G", subtitle:`${state.lens.toLowerCase()}.graph-node · linked`};
        el("crumbObject").textContent = name;
        renderInspector();
      }));
      document.querySelectorAll("[data-table-name]").forEach(node => node.addEventListener("click", () => {
        const name = node.dataset.tableName;
        const base = profiles[state.profile].defaultSelection;
        state.selected = {...base, name, id:name, kind:"Model Record", icon:"T", subtitle:`${state.lens.toLowerCase()}.record · validated`};
        el("crumbObject").textContent = name;
        renderInspector();
      }));
    }

    function renderLegend() {
      el("legend").innerHTML = profiles[state.profile].legend.map(([label,color]) => `<span><i style="background:${color}"></i>${label}</span>`).join("");
    }

    function renderInspectorTabs() {
      el("inspectorTabs").innerHTML = inspectorTabNames.map(name => `<button class="inspector-tab ${state.inspectorTab === name ? "active" : ""}" data-inspector-tab="${name}">${name}</button>`).join("");
      document.querySelectorAll(".inspector-tab").forEach(btn => btn.addEventListener("click", () => {
        state.inspectorTab = btn.dataset.inspectorTab;
        renderInspectorTabs();
        renderInspector();
      }));
    }

    function fieldRows(fields) {
      return Object.entries(fields).map(([k,v]) => `<div class="field"><label>${k}</label><input value="${v}" /></div>`).join("");
    }

    function renderInspector() {
      const s = state.selected || profiles[state.profile].defaultSelection;
      el("selectionKind").textContent = s.kind;
      let body = `<div class="entity-summary"><div class="entity-icon">${s.icon}</div><div><h3>${s.name}</h3><p>${s.subtitle}</p></div></div>
        <div class="badges">${s.badges.map((b,i)=>`<span class="badge ${i===1?'bound':i===2?'generated':''}">${b}</span>`).join("")}</div>`;

      if (state.inspectorTab === "Definition") {
        body += `<div class="section-card"><h4>Identity & Definition</h4><div class="fields">${fieldRows(s.fields)}</div></div>`;
        if (state.lens === "Affect" || state.profile === "slavia") {
          body += `<div class="section-card"><h4>${state.profile === "slavia" ? "World Response" : "Affective State"}</h4><div class="fields" style="display:block">${Object.entries(s.affect).map(([k,v])=>`<div class="meter-row"><span>${k}</span><div class="meter"><i style="width:${v}%"></i></div><b>${v}%</b></div>`).join("")}</div></div>`;
        }
      } else if (state.inspectorTab === "Components") {
        const comps = state.profile === "idaptik" ? ["Transform","RoomMembership","NetworkVantage","Perception","BeliefState","AlertResponse"] : ["Transform","WorldReceptivity","PlaceMemory","InfluenceReceiver","NaturalResponse","RiftSusceptibility"];
        body += `<div class="section-card"><h4>Component Stack</h4><div class="fields">${comps.map((c,i)=>`<div class="field"><label>${i+1}</label><input value="${c}" /></div>`).join("")}</div></div>`;
      } else if (state.inspectorTab === "Relations") {
        const rels = state.profile === "idaptik" ? [["inside","ops-room"],["powered-by","substation"],["visible-to","camera-02"],["reports-to","security-hub"]] : [["crosses","ravine"],["responds-to","settling"],["remembers","care"],["susceptible-to","rift"]];
        body += `<div class="section-card"><h4>Relations</h4><div class="fields">${rels.map(([a,b])=>`<div class="field"><label>${a}</label><input value="${b}" /></div>`).join("")}</div></div>`;
      } else if (state.inspectorTab === "Events") {
        const events = state.profile === "idaptik" ? ["CameraFeedLost","DoorRouted","SuspicionRaised","GoalReprioritised"] : ["QuickeningEntered","SettlingReceived","BridgeStabilised","RiftInvertedResponse"];
        body += `<div class="section-card"><h4>Subscribed Events</h4><div class="fields">${events.map((e,i)=>`<div class="field"><label>${i<2?'receives':'emits'}</label><input value="${e}" /></div>`).join("")}</div></div>`;
      } else {
        body += `<div class="section-card"><h4>Validation Status</h4><div class="fields"><div class="field"><label>schema</label><input value="passed" /></div><div class="field"><label>references</label><input value="passed" /></div><div class="field"><label>profile</label><input value="passed" /></div><div class="field"><label>runtime</label><input value="not yet proven" /></div></div></div>`;
      }
      el("inspectorContent").innerHTML = body;
    }

    function renderDockTabs() {
      el("dockTabs").innerHTML = dockTabNames.map(name => `<button class="dock-tab ${state.dockTab === name ? "active" : ""}" data-dock-tab="${name}">${name}</button>`).join("");
      document.querySelectorAll(".dock-tab").forEach(btn => btn.addEventListener("click", () => {
        state.dockTab = btn.dataset.dockTab;
        renderDockTabs();
        renderDock();
      }));
    }

    function problemsPane() {
      const rows = state.profile === "idaptik"
        ? [["WARN","Mission","Alternative extraction route has no authored debrief text","Laundry Chute"],["WARN","Systems","PBX world coordinate is inherited from profile default","PBX / Comms"],["PASS","Schema","All stable IDs are unique","Package"],["PASS","Network","Every camera maps to a reachable node","Grounded Network"],["PASS","Replay","Edit history replays to identical model hash","Package"]]
        : [["WARN","World","Rift inversion has no recovery threshold","Rift Verge"],["WARN","Narrative","Shrine recognition beat is not yet bound to dialogue","Wayside Shrine"],["PASS","Profile","No IDApTIK vocabulary leaked into Slavia model","Package"],["PASS","Response","Bird response is recipient-owned, not commanded","Bird Flock"],["PASS","Cooperation","Bridge completion requires both heroines","First Crossing"]];
      return `<table class="problems-table"><thead><tr><th style="width:80px">Status</th><th style="width:120px">Family</th><th>Finding</th><th style="width:180px">Location</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="sev ${r[0]==='PASS'?'good':'warn'}">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="row-link">${r[3]}</td></tr>`).join("")}</tbody></table>`;
    }

    function constraintsPane() {
      return `<div class="constraint-layout"><div class="constraint-editor"><textarea id="constraintText">${state.profile === "idaptik" ? "Find a valid patrol and device layout where the hacker has two routes to the security VLAN and every critical mission state retains an extraction path." : "Find a valid Border Path arrangement where Donna can settle the bridge, Anya can cross, birds respond naturally, and Rift corruption remains detectable rather than arbitrary."}</textarea><div class="constraint-options"><select class="mini-select"><option>Scope: current zone</option><option>Scope: whole package</option></select><select class="mini-select"><option>3 proposals</option><option>6 proposals</option></select></div><button class="btn primary" id="solveBtn" style="width:100%">Find satisfying models</button></div><div class="proposal-grid"><div class="proposal selected"><h4>Balanced route</h4><p>Preserves the authored critical chain and adds one optional recovery path.</p><code>score 0.91 · 0 conflicts</code></div><div class="proposal"><h4>High tension</h4><p>Increases pressure while retaining deterministic recoverability.</p><code>score 0.84 · 1 warning</code></div><div class="proposal"><h4>Low complexity</h4><p>Reduces entities and uses the smallest valid component set.</p><code>score 0.79 · 0 conflicts</code></div></div></div>`;
    }

    function historyPane() {
      const rows = [["#018","set_property","ops-room.support = 0.74","passed","UMS"],["#017","add_relation","camera-02 → security-vlan","passed","solver"],["#016","add_entity","camera-02","passed","human"],["#015","set_mission","extraction = laundry-chute","warning","human"],["#014","generate_zone","operations-floor","passed","solver"]];
      return `<table class="history-table"><thead><tr><th style="width:70px">Edit</th><th style="width:150px">Operation</th><th>Arguments</th><th style="width:100px">Impact</th><th style="width:90px">Origin</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td class="row-link">${r[1]}</td><td>${r[2]}</td><td class="sev ${r[3]==='passed'?'good':'warn'}">${r[3]}</td><td>${r[4]}</td></tr>`).join("")}</tbody></table>`;
    }

    function tracePane() {
      const defaultTrace = state.profile === "idaptik"
        ? [["0000","RunStarted","seed=1701"],["0060","CameraFeedLost","camera-02"],["0061","AppraisalUpdated","possible interference"],["0062","AffectChanged","anxiety +0.15"],["0063","GoalReprioritised","verify camera +0.20"],["0064","BehaviourSelected","call security desk"]]
        : [["0000","ZoneEntered","Border Path"],["0042","QuickeningEntered","Anya → Bird Flock"],["0043","NaturalResponse","agitation +0.24"],["0047","ThresholdCrossed","birds take flight"],["0081","SettlingEntered","Donna → Bridge"],["0085","BridgeStabilised","stability 0.34 → 0.71"]];
      const rows = state.trace.length ? state.trace : defaultTrace;
      return `<div class="sim-controls"><button class="btn icon" id="tracePlayBtn">${state.simRunning?'Ⅱ':'▶'}</button><button class="btn icon" id="stepBtn">↦</button><button class="btn" id="resetSimBtn">Reset</button><span class="sim-time">tick ${String(state.simTick).padStart(4,'0')} · 60 Hz · deterministic</span></div><table class="trace-table"><thead><tr><th style="width:90px">Tick</th><th style="width:190px">Event</th><th>Payload</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td class="row-link">${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</tbody></table>`;
    }

    function guaranteesPane() {
      const rows = state.profile === "idaptik"
        ? [["stable IDs","PROVEN","schema + tests"],["edit replay","TESTED","model hash equality"],["game loader round-trip","DESIGNED","integration pending"],["critical route remains solvable","TESTED","bounded search"],["render interpolation non-causal","PROVEN","Enaction invariant"]]
        : [["profile isolation","TESTED","cross-vocabulary rejection"],["natural response ownership","DESIGNED","profile contract"],["bridge cooperation","TESTED","Zone A fixture"],["Rift inversion detectable","DESIGNED","trace requirement"],["runtime round-trip","NOT STARTED","Slavia loader absent"]];
      return `<table class="problems-table"><thead><tr><th>Guarantee</th><th style="width:150px">Status</th><th style="width:250px">Evidence</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td class="sev ${r[1]==='PROVEN'||r[1]==='TESTED'?'good':r[1]==='DESIGNED'?'warn':'bad'}">${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</tbody></table>`;
    }

    function renderDock() {
      let content = "";
      if (state.dockTab === "Problems") content = problemsPane();
      else if (state.dockTab === "Constraints" || state.dockTab === "Solver Proposals") content = constraintsPane();
      else if (state.dockTab === "Edit History") content = historyPane();
      else if (state.dockTab === "Simulation Trace") content = tracePane();
      else content = guaranteesPane();
      el("dockContent").innerHTML = `<div class="dock-pane active">${content}</div>`;
      bindDockActions();
    }

    function bindDockActions() {
      el("solveBtn")?.addEventListener("click", () => showToast("3 constraint-satisfying proposals generated"));
      el("tracePlayBtn")?.addEventListener("click", toggleSimulation);
      el("stepBtn")?.addEventListener("click", stepSimulation);
      el("resetSimBtn")?.addEventListener("click", resetSimulation);
      document.querySelectorAll(".proposal").forEach(p => p.addEventListener("click", () => {
        document.querySelectorAll(".proposal").forEach(x=>x.classList.remove("selected"));
        p.classList.add("selected");
      }));
    }

    function stepSimulation() {
      state.simTick += 1;
      const events = state.profile === "idaptik"
        ? [["CameraSweep","camera-02 phase advanced"],["PerceptionUpdated","Billy sight cone recomputed"],["TraceAdvanced","hacker trace +1"],["GoalChecked","extraction path remains available"]]
        : [["InfluenceSampled","quickening field sampled"],["MemoryUpdated","bridge remembers care"],["ResponseAppraised","birds remain within natural range"],["RiftPulse","corruption +0.01"]];
      const e = events[state.simTick % events.length];
      state.trace.push([String(state.simTick).padStart(4,"0"), e[0], e[1]]);
      if (state.dockTab === "Simulation Trace") renderDock();
    }

    let simTimer = null;
    function toggleSimulation() {
      state.simRunning = !state.simRunning;
      if (state.simRunning) {
        simTimer = setInterval(stepSimulation, 420);
        showToast("Deterministic preview running at 60 Hz");
      } else {
        clearInterval(simTimer); simTimer = null;
      }
      if (state.dockTab === "Simulation Trace") renderDock();
      el("simulateBtn").textContent = state.simRunning ? "Ⅱ Pause" : "▶ Simulate";
    }

    function resetSimulation() {
      state.simRunning = false;
      clearInterval(simTimer); simTimer = null;
      state.simTick = 0; state.trace = [];
      el("simulateBtn").textContent = "▶ Simulate";
      renderDock();
      showToast("Simulation reset to seed 1701");
    }

    function renderProfile() {
      const p = profiles[state.profile];
      document.body.className = p.accentClass;
      state.selected = p.defaultSelection;
      state.simTick = 0; state.trace = [];
      el("projectName").textContent = p.project;
      el("profileVersion").textContent = p.version;
      el("crumbProfile").textContent = p.label;
      el("crumbObject").textContent = p.rootLabel;
      el("selectionKind").textContent = p.defaultSelection.kind;
      el("okCount").textContent = state.profile === "idaptik" ? "18 passed" : "14 passed";
      el("warnCount").textContent = "2 warnings";
      el("badCount").textContent = "0 errors";
      renderTree(); renderStage(); renderInspector(); renderDock();
    }

    function init() {
      renderLenses(); renderInspectorTabs(); renderDockTabs(); renderProfile();

      el("profileSelect").addEventListener("change", e => {
        state.profile = e.target.value;
        renderProfile();
        showToast(`${profiles[state.profile].label} profile loaded`);
      });
      el("treeSearch").addEventListener("input", e => { state.filteredTree = e.target.value; renderTree(); });
      document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", () => {
        document.querySelectorAll("[data-view]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderStage();
      }));
      el("validateBtn").addEventListener("click", () => { state.dockTab = "Problems"; renderDockTabs(); renderDock(); showToast("Validation completed: 0 errors, 2 warnings"); });
      el("generateBtn").addEventListener("click", () => { state.dockTab = "Solver Proposals"; renderDockTabs(); renderDock(); showToast("Constraint composer opened"); });
      el("simulateBtn").addEventListener("click", () => { state.dockTab = "Simulation Trace"; renderDockTabs(); renderDock(); toggleSimulation(); });
      el("buildBtn").addEventListener("click", () => showToast(`${profiles[state.profile].project} package built locally`));
      el("fitBtn").addEventListener("click", () => showToast("View fitted to current selection"));
      el("overlayBtn").addEventListener("click", () => showToast("Overlay palette: topology, power, affect, visibility, mission routes"));
      el("lockBtn").addEventListener("click", e => { e.target.classList.toggle("active"); e.target.textContent = e.target.classList.contains("active") ? "Geometry locked" : "Lock geometry"; });
    }

    init();
  </script>
</body>
</html>
